name: X Auto Post

on:
  schedule:
    - cron: '30 22 * * *'   # 07:30 JST (UTC 22:30 前日) → ブログCronの30分後に3投稿まとめて生成
  workflow_dispatch:

jobs:
  post:
    name: Trigger X auto post
    runs-on: ubuntu-latest
    steps:
      - name: Call X post cron endpoint
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/x-posts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP Status: $STATUS"
          echo "Response:"
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "Error: Unexpected status code $STATUS"
            exit 1
          fi
