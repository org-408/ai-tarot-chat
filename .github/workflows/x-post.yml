name: X Auto Post

on:
  schedule:
    # 毎日 9:00 JST (UTC 00:00) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 管理画面から手動実行も可能

jobs:
  post:
    name: Trigger X auto post
    runs-on: ubuntu-latest
    steps:
      - name: Call X post cron endpoint
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/x-posts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP Status: $STATUS"
          echo "Response:"
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "Error: Unexpected status code $STATUS"
            exit 1
          fi
