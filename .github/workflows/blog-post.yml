name: Blog Auto Post

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST (UTC 22:00 前日) → 4記事まとめて生成
  workflow_dispatch:

jobs:
  post:
    name: Trigger blog auto post
    runs-on: ubuntu-latest
    steps:
      - name: Call blog post cron endpoint
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/cron/blog-posts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP Status: $STATUS"
          echo "Response:"
          cat /tmp/response.json
          if [ "$STATUS" != "200" ]; then
            echo "Error: Unexpected status code $STATUS"
            exit 1
          fi
