name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  # ─────────────────────────────────────────
  # Web (Next.js)
  # ─────────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: web
    env:
      # Prisma generate と tsc に必要な最低限のダミー値
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      SHADOW_DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/shadow?schema=public
      AUTH_SECRET: ci-dummy-secret-for-build-only
      LOCAL_TIMEZONE: Asia/Tokyo
      DISABLE_CONSOLE_LOG: "true"
      ENABLE_FILE_LOG: "false"
      ENABLE_DB_LOG: "false"
      GOOGLE_VERTEX_PROJECT: dummy-project
      GOOGLE_VERTEX_LOCATION: us-central1
      GOOGLE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
      GOOGLE_PRIVATE_KEY: "dummy"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Prisma クライアント生成（tsc・build に必要）
      - name: Prisma generate
        run: npx prisma generate

      - name: Create shadow database
        run: |
          psql "postgresql://ci:ci@127.0.0.1:5432/postgres" -tc "SELECT 1 FROM pg_database WHERE datname = 'shadow'" | grep -q 1 || \
            psql "postgresql://ci:ci@127.0.0.1:5432/postgres" -c "CREATE DATABASE shadow;"

      # Next.js は tsc 実行前に next-env.d.ts が必要
      - name: Generate next-env.d.ts
        run: echo '/// <reference types="next" />\n/// <reference types="next/image-types/global" />' > next-env.d.ts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # prisma/migrations が存在する場合のみ、schema との差分チェック
      # （migration ファイルを作り忘れた場合に CI を落とす）
      - name: Prisma migration diff check
        run: |
          if [ -d "prisma/migrations" ]; then
            npx prisma migrate diff \
              --from-migrations ./prisma/migrations \
              --to-schema-datamodel ./prisma/schema.prisma \
              --shadow-database-url "$SHADOW_DATABASE_URL" \
              --exit-code
            echo "✅ schema.prisma と migrations の差分なし"
          else
            echo "ℹ️  migrations ディレクトリ未作成のためスキップ"
          fi

  # ─────────────────────────────────────────
  # Mobile (Capacitor / Vite)
  # ─────────────────────────────────────────
  mobile:
    name: Mobile (Capacitor/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build
